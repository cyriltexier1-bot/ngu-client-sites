<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assistant Performance Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header class="topbar">
      <div>
        <p class="eyebrow">Live Workspace</p>
        <h1>Assistant Performance Dashboard</h1>
        <p class="muted">Track tasks, priorities, deadlines, delivery pace, and progress updates.</p>
      </div>
      <div class="right-tools">
        <div class="status"><span class="dot"></span>Active</div>
        <button id="exportBtn" class="ghost">Export JSON</button>
        <label class="import-label ghost" for="importFile">Import JSON</label>
        <input type="file" id="importFile" accept="application/json" />
      </div>
    </header>

    <section class="cards" id="metrics"></section>

    <section class="panel controls">
      <div class="row">
        <input id="searchInput" type="search" placeholder="Search tasks..." />
        <select id="priorityFilter">
          <option value="all">All Priorities</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
        <select id="ownerFilter">
          <option value="all">All Owners</option>
          <option value="Assistant">Assistant</option>
          <option value="Marcus">Marcus</option>
        </select>
      </div>
      <div class="row">
        <button id="addTaskBtn">+ Add Task</button>
        <button id="addUpdateBtn">+ Add Update</button>
        <button id="clearDoneBtn" class="danger">Clear Done</button>
      </div>
      <div class="progress-wrap">
        <div class="progress-label">
          <span>Completion Progress</span>
          <strong id="progressText">0%</strong>
        </div>
        <div class="progress-bar"><div id="progressFill"></div></div>
      </div>
    </section>

    <section class="layout">
      <article class="panel">
        <div class="panel-head">
          <h2>Task Board</h2>
          <small id="taskCounter">0 tasks</small>
        </div>
        <div class="columns" id="board"></div>
      </article>

      <article class="panel">
        <div class="panel-head"><h2>Updates</h2></div>
        <ul id="updates" class="updates"></ul>
      </article>
    </section>
  </div>

  <template id="taskTemplate">
    <div class="task">
      <div class="task-head">
        <h4></h4>
        <span class="badge"></span>
      </div>
      <p class="details"></p>
      <div class="meta"></div>
      <div class="actions">
        <button class="move">Move</button>
        <button class="edit ghost">Edit</button>
        <button class="delete danger">Delete</button>
      </div>
    </div>
  </template>

  <script src="app.js"></script>
</body>
</html>
